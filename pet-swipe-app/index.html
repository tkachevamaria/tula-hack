<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PetMatch - Найди друга</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/pets.css">
</head>
<body>
    <div id="app">
        <!-- Экран приветствия -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-content">
                <div class="logo-container">
                    <div class="logo-icon">🐾</div>
                    <h1>PetMatch</h1>
                </div>
                <p class="welcome-subtitle">Найди идеального питомца</p>
                <div class="button-wrapper">
                    <button id="start-btn" class="btn-primary">Начать</button>
                </div>
            </div>
        </div>

        <!-- Экран авторизации -->
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <button id="back-to-welcome" class="btn-back">←</button>
                <h2>Вход / Регистрация</h2>
                <p class="auth-hint">Введите логин и пароль. Если аккаунта нет — создадим новый.</p>
                
                <div class="role-switch">
                    <button type="button" id="role-user" class="role-btn active">🐾 Человек</button>
                    <button type="button" id="role-org" class="role-btn">🏢 Организация</button>
                </div>
                
                <form id="auth-form">
                    <div class="form-group">
                        <label for="login" id="login-label">Логин</label>
                        <input type="text" id="login" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Продолжить</button>
                </form>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Главный экран приложения -->
        <div id="app-screen" class="screen">
            <nav class="top-nav">
                <button class="nav-btn active" data-page="feed">Лента</button>
                <button class="nav-btn" data-page="add-pet">➕</button>
                <button class="nav-btn" data-page="chats">Чаты</button>
                <button class="nav-btn" data-page="profile">Профиль</button>
            </nav>

            <div class="pages-container">
                <div id="feed-page" class="page active"></div>
                <div id="add-pet-page" class="page"></div>
                <div id="chats-page" class="page"></div>
                <div id="profile-page" class="page"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
