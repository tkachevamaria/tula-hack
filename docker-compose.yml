services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      YANDEX_ACCESS_KEY_ID: ${YANDEX_ACCESS_KEY_ID}
      YANDEX_SECRET_ACCESS_KEY: ${YANDEX_SECRET_ACCESS_KEY}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  web:
    build:
      context: ./pet-swipe-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
